{% extends "base.html" %}

{% block title %}編輯任務 - TaskFlow{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title fw-bold mb-4">編輯任務</h5>
                <form action="{{ url_for('tasks.edit_task', id=task.id) }}" method="POST">
                    <div class="mb-3">
                        <label for="title" class="form-label">任務名稱</label>
                        <input type="text" class="form-control" id="title" name="title" value="{{ task.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="points" class="form-label">獎勵積分</label>
                        <input type="number" class="form-control" id="points" name="points" value="{{ task.points }}" min="1" max="100">
                    </div>
                    <div class="mb-3">
                        <label for="due_date" class="form-label">截止日期</label>
                        <input type="date" class="form-control" id="due_date" name="due_date" value="{{ task.due_date.strftime('%Y-%m-%d') if task.due_date else '' }}">
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">備註</label>
                        <textarea class="form-control" id="description" name="description" rows="4">{{ task.description or '' }}</textarea>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('tasks.index') }}" class="btn btn-outline-secondary">取消</a>
                        <button type="submit" class="btn btn-primary px-4">儲存變更</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
